services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fullstackdb}
      POSTGRES_USER: ${POSTGRES_USER:-fullstack_user}
      # Compose requires this value from .env; never commit a real password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set a local password}
    volumes:
      # Named volume keeps database data when containers are recreated.
      - postgres-data:/var/lib/postgresql/data
      # Initialization scripts run only when PostgreSQL creates an empty data directory.
      - ./database/init/001-schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_PORT: "8080"
      # "database" resolves through Compose's internal DNS.
      DB_URL: jdbc:postgresql://database:5432/${POSTGRES_DB:-fullstackdb}
      DB_USER: ${POSTGRES_USER:-fullstack_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Copy .env.example to .env and set a local password}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "java", "-cp", "app.jar:lib/*", "dockercomposefullstack.HealthCheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-8081}:80"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
