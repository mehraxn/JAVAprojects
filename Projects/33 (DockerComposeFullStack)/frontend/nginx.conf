server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # The public API health route maps to the backend's internal /health.
    location = /api/health {
        proxy_pass http://backend:8080/health;
    }

    # Nginx reaches the backend by its Compose service name; /api/* paths are
    # forwarded unchanged (the backend serves /api/notes itself).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
