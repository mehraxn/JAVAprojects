[defaults]
# The example inventory is the default so local validation commands work
# out of the box. For a real run, pass your local copy explicitly:
#   ansible-playbook -i inventory.ini playbook.yml
inventory = inventory.ini.example
roles_path = roles
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
# Ask for the sudo password interactively instead of storing it anywhere.
become_ask_pass = True
