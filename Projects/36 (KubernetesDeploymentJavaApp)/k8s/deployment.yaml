apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app.kubernetes.io/name: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: java-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: java-app
          # Placeholder image for a future local learning build.
          image: my-java-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: java-app-config
          env:
            - name: APP_DEMO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: java-app-example-secret
                  key: APP_DEMO_TOKEN
                  # The example Secret does not need to be created for the app to start.
                  optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: temporary-files
              mountPath: /tmp
      volumes:
        # The JVM receives a small writable temporary area while the root stays read-only.
        - name: temporary-files
          emptyDir:
            sizeLimit: 64Mi
      terminationGracePeriodSeconds: 15
