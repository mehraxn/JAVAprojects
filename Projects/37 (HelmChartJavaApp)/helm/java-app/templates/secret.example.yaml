{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
# Example only. Prefer a separately managed Secret for real environments.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "java-app.fullname" . }}
  labels:
    {{- include "java-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_DEMO_TOKEN: {{ required "secret.demoToken is required when secret.create is true" .Values.secret.demoToken | quote }}
{{- end }}
