# Default values are for a disposable learning environment, not production.
# Validated by values.schema.json — invalid types/enums fail helm lint/template.
replicaCount: 2

nameOverride: ""
fullnameOverride: ""

image:
  # Versioned local tag, never latest. Production should use a real registry
  # reference and promote by immutable image digest.
  repository: helm-java-app
  tag: "0.1.0"
  pullPolicy: IfNotPresent

containerPort: 8080

serviceAccount:
  # Create a dedicated ServiceAccount for the workload. If false and name is
  # empty, the namespace's "default" ServiceAccount is used.
  create: true
  # Overrides the generated ServiceAccount name when set.
  name: ""
  # The app never talks to the Kubernetes API, so no token is mounted.
  automount: false
  annotations: {}

config:
  environment: learning
  message: "Hello from a Helm ConfigMap"

secret:
  # Leave false for the default example. Never put real secret values in values.yaml.
  create: false
  demoToken: ""
  # Set only the name of a separately managed Secret when one is approved.
  existingSecret: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  # Ingress class name, e.g. "nginx". Empty uses the cluster default.
  className: ""
  annotations: {}
  hosts:
    - host: java-app.local
      paths:
        - path: /
          pathType: Prefix
  # TLS is off by default; see examples/values-ingress.yaml for the shape.
  tls: []

probes:
  readiness:
    path: /ready
    initialDelaySeconds: 3
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
