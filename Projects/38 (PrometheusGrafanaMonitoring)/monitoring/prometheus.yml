global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: phase3-java-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8080

