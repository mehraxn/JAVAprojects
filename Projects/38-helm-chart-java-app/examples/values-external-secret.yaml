# External-secret example: the chart creates NO Secret; the Deployment
# references one that is managed outside Helm.
#
# The Secret must already exist in the release namespace with an
# APP_DEMO_TOKEN key, e.g. (demo value only):
#   kubectl create secret generic java-app-existing-secret \
#     --from-literal=APP_DEMO_TOKEN=demo-not-a-real-token
#
# Note: Helm cannot hash an external Secret's content, so rotating it does
# NOT roll pods automatically — see docs/values.md.
secret:
  create: false
  existingSecret: java-app-existing-secret
