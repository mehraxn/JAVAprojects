# Ingress example: exposes the app at http://java-app.local (add the host to
# /etc/hosts for local clusters). Requires an installed Ingress controller.
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
  hosts:
    - host: java-app.local
      paths:
        - path: /
          pathType: Prefix
  # TLS example shape (needs a Secret with the certificate):
  # tls:
  #   - secretName: java-app-local-tls
  #     hosts:
  #       - java-app.local
  tls: []
