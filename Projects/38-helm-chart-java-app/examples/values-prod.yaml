# Prod-style overrides: more replicas, prod config, stronger resources.
# Still a demo — a real production values file would reference a real
# registry image (ideally by immutable digest) and reviewed sizing.
replicaCount: 3

image:
  tag: "0.1.0"

config:
  environment: prod
  message: "Hello from the prod values file"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
