server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Positions let Promtail resume without rereading the complete file.
  filename: /var/lib/promtail/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: fake

scrape_configs:
  - job_name: java-app-files
    static_configs:
      - targets:
          - localhost
        labels:
          job: java-app
          __path__: /var/log/java-app/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service: service
            environment: environment
            event: event
            traceId: traceId
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # Only bounded fields become indexed labels. event and traceId remain log fields.
      - labels:
          level:
          service:
          environment:
