server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: phase3-java-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: phase3-java-app
          environment: dev
          __path__: /var/log/phase3/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            event: event
      - labels:
          level:
          event:

# TODO: Restrict labels and validate redaction before processing real logs.
