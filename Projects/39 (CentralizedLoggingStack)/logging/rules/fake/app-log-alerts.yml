groups:
  - name: java-app-log-alerts
    rules:
      - alert: JavaAppErrorLogBurst
        expr: sum(count_over_time({job="java-app"} |= "\"level\":\"ERROR\"" [5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "More than five Java application error logs in five minutes"
          description: "This is an example threshold that must be reviewed against normal behavior."
