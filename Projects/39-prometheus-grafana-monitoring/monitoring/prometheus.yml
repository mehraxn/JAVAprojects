global:
  # Prometheus polls each target at this interval.
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: java-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8080
        labels:
          environment: learning
