# Design-only production example. Sync is deliberately manual.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.invalid/gitops-deployment-platform.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: java-app-prod-design-only
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
