replicaCount: 1

image:
  repository: gitops-java-app
  tag: "0.1.0" # versioned local tag, never latest; production should pin a digest
  pullPolicy: IfNotPresent

service:
  port: 80
  containerPort: 8080

config:
  environment: learning
  version: "0.1.0"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Secrets are intentionally excluded from this chart starter.
