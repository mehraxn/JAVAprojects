services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      LOG_FILE: /var/log/java-app/application.log
      APP_SERVICE: java-app
      APP_ENVIRONMENT: learning
      ERROR_EVERY_N: ${ERROR_EVERY_N:-0}
      HEARTBEAT_INTERVAL_MS: ${HEARTBEAT_INTERVAL_MS:-30000}
    volumes:
      - app-logs:/var/log/java-app
    networks:
      - logging-network

  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./logging/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ./logging/rules:/etc/loki/rules:ro
      - loki-data:/loki
    networks:
      - logging-network

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./logging/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - app-logs:/var/log/java-app:ro
      - promtail-positions:/var/lib/promtail
    depends_on:
      - app
      - loki
    networks:
      - logging-network

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Copy .env.example to .env and set a local password}
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    volumes:
      - ./logging/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./logging/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - logging-network

networks:
  logging-network:
    driver: bridge

volumes:
  app-logs:
  loki-data:
  promtail-positions:
  grafana-data:
