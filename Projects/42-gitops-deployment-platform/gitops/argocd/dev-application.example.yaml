# Example only. The repoURL is a placeholder and no real cluster is targeted.
# `path` assumes the repository root contains the folder
# "Projects/42-gitops-deployment-platform"; adjust it to your actual repo layout
# (e.g. prefix with Projects/ in a multi-project monorepo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-dev
  namespace: argocd
spec:
  # Guardrails come from gitops/argocd/appproject.example.yaml.
  project: gitops-platform
  source:
    repoURL: https://example.invalid/gitops-deployment-platform.git
    targetRevision: main
    path: Projects/42-gitops-deployment-platform/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: java-app-dev
  syncPolicy:
    # Dev auto-syncs and self-heals drift; prune stays off so a bad commit
    # cannot mass-delete resources without a human look.
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      # The namespace is declared in Git (k8s/overlays/dev/namespace.yaml),
      # so Argo CD does not need to create it implicitly.
      - CreateNamespace=false
