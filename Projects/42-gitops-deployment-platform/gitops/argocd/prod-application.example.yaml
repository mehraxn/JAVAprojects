# Design-only production example. Sync is deliberately manual: without an
# `automated:` block, Argo CD only reports drift and a human approves each
# release from the reviewed Git state. The repoURL is a placeholder and no
# real cluster is targeted.
# `path` assumes the repository root contains the folder
# "Projects/42-gitops-deployment-platform"; adjust it to your actual repo layout.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-app-prod
  namespace: argocd
spec:
  # Guardrails come from gitops/argocd/appproject.example.yaml.
  project: gitops-platform
  source:
    repoURL: https://example.invalid/gitops-deployment-platform.git
    targetRevision: main
    path: Projects/42-gitops-deployment-platform/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: java-app-prod-design-only
  syncPolicy:
    syncOptions:
      # The namespace is declared in Git (k8s/overlays/prod/namespace.yaml).
      - CreateNamespace=false
