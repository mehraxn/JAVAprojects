# =============================================================================
# Secure CI/CD pipeline — runnable, MANUAL-ONLY workflow.
#
# ACTIVATION: GitHub only discovers workflows in the repository-root
# .github/workflows/ directory. This file ships inside the project folder, so
# it is inert until you copy it to <repo-root>/.github/workflows/ and set
# PROJECT_DIR below to the project folder's path relative to the repo root.
#
# Safety properties:
#   - workflow_dispatch (manual) trigger only — never runs on push/PR
#   - least-privilege permissions (contents: read)
#   - the Docker image is built locally on the runner and NEVER pushed
#   - nothing is signed; signing is documented as a release-stage control
#   - no real tokens, registries, or secrets are embedded
#
# Action references are versioned (e.g. actions/checkout@v4) for readability.
# A production pipeline should pin actions to full commit SHAs and update them
# through a controlled dependency process.
# =============================================================================
name: secure-cicd-pipeline

on:
  workflow_dispatch:

# This pipeline neither pushes packages nor signs, so it needs nothing beyond
# read access. Keyless signing would additionally require `id-token: write`;
# uploading SARIF to code scanning would require `security-events: write`.
permissions:
  contents: read

env:
  # Path of this project folder relative to the repository root. Adjust if the
  # folder lives elsewhere (e.g. "Projects/43 (SecureCICDPipeline)").
  PROJECT_DIR: "43 (SecureCICDPipeline)"
  IMAGE: secure-cicd-java-app

jobs:
  secure-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create artifact directory
        run: mkdir -p "${{ env.PROJECT_DIR }}/artifacts"

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/scan:ro" \
            zricethezav/gitleaks:v8.18.4 \
            detect --source /scan --no-git --redact

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Static analysis and compile (javac -Xlint -Werror)
        working-directory: ${{ env.PROJECT_DIR }}
        run: javac -Xlint:all -Werror -d out src/securecicdpipeline/*.java

      - name: Compile and run tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          javac -Xlint:all -Werror -cp out -d test-out test/securecicdpipeline/*.java
          java -cp "out:test-out" securecicdpipeline.BuildInfoTest

      - name: Build image (local only)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker build \
            --build-arg APP_VERSION=0.1.0 \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t "${{ env.IMAGE }}:0.1.0-${{ github.sha }}" .

      - name: Dependency scan (Trivy fs)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ env.PROJECT_DIR }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: ${{ env.PROJECT_DIR }}/artifacts/trivy-deps.sarif

      - name: Image scan (Trivy image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:0.1.0-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: ${{ env.PROJECT_DIR }}/artifacts/trivy-image.sarif

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:0.1.0-${{ github.sha }}
          format: cyclonedx-json
          output-file: ${{ env.PROJECT_DIR }}/artifacts/sbom.cyclonedx.json
          upload-artifact: false

      # Keyless signing binds a signature to a registry image digest via the
      # workflow's OIDC identity. This pipeline never pushes an image, so there
      # is no digest to sign — by design. See docs/image-signing.md.
      - name: Signing and attestation (design note — nothing is signed here)
        run: |
          echo "Signing is a release-stage control and is NOT executed in this pipeline."
          echo "This build never pushes an image, so no registry digest exists to sign."
          echo "See docs/image-signing.md for the keyless (OIDC) flow a release job would run."

      - name: Upload security evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: ${{ env.PROJECT_DIR }}/artifacts/
          if-no-files-found: error
