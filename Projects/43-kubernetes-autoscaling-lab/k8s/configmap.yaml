apiVersion: v1
kind: ConfigMap
metadata:
  name: autoscaling-java-app-config
  labels:
    app: autoscaling-java-app
data:
  # Listen port for the app. Must match containerPort and the probe ports
  # in deployment.yaml, and targetPort in service.yaml.
  PORT: "8080"
  # Safety cap (milliseconds) on a single /work request so a load test cannot
  # pin a Pod indefinitely. See load-test/README.md.
  MAX_WORK_MS: "2000"
