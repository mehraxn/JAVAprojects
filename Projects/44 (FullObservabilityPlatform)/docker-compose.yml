# =============================================================================
# Full observability lab — a local, runnable stack.
# =============================================================================
# `docker compose up -d` builds the Java app image (observable-java-app:0.1.0),
# starts Prometheus, Loki, Promtail, Grafana (auto-provisioned with datasources +
# dashboard), and — as a tracing-backend EXTENSION — the OpenTelemetry Collector
# and Tempo. It is a LOCAL DEMO: no real secrets, no external endpoints, no
# persistence tuned for production. See TESTING.md for validation steps.
#
# Signal flow (see diagrams/observability-flow.md):
#   app ──/metrics──────────────▶ Prometheus ─┐
#   app ──JSON log file──▶ Promtail ▶ Loki ────┼─▶ Grafana (metrics + logs)
#   app ──trace_id in logs/headers (correlation)┘
#
# Tracing note: the app produces W3C trace context (trace_id/span_id) for log
# correlation but does NOT export spans. The OTel Collector + Tempo below are
# included and run as an example tracing backend, ready for real instrumentation
# (see docs/traces.md → Future improvements); they are not exercised by the app.
# =============================================================================
services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.example
    image: observable-java-app:0.1.0
    environment:
      APP_PORT: "8080"
      APP_ENV: dev
      APP_LOG_FILE: /var/log/app/app.log
      OTEL_SERVICE_NAME: observable-java-app
    volumes:
      # App writes JSON logs here; Promtail reads the same directory (below).
      - ./logs/app:/var/log/app
    ports:
      - "8080:8080"

  # --- Tracing backend EXTENSION (not exercised by the app; see note above) ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./monitoring/otel-collector.example.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4318:4318"   # OTLP HTTP (ready to receive spans from a future exporter)
      - "8889:8889"   # Prometheus metrics exposed by the collector
    depends_on:
      - tempo

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.example.yml:/etc/prometheus/alerts.example.yml:ro
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./logging/loki-config.example.yml:/etc/loki/config.yml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.1.0
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./logging/promtail-config.example.yml:/etc/promtail/config.yml:ro
      # Read-only view of the app's log directory (written by the app service).
      - ./logs/app:/var/log/app:ro
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./monitoring/tempo.example.yml:/etc/tempo/config.yml:ro
    ports:
      - "3200:3200"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      # Placeholder only — a real deployment would inject a secret, not a literal.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana-dashboard.example.json:/var/lib/grafana/dashboards/app.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

# No named volumes are defined: signal storage is in-container and disposable, so
# `docker compose down` leaves a clean machine. Add persistent volumes, a
# dedicated network, and real secret management before any non-lab use.
