# Promtail configuration for the observability lab.
# Promtail tails the app's JSON log files, parses each line, promotes a few
# LOW-cardinality fields to Loki labels, and ships the whole line as the log
# body. The full JSON — including trace_id — is always kept in the body, so
# Grafana can still search or correlate on trace_id via LogQL / derived fields.
server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: observable-java-app
    static_configs:
      - targets: [localhost]
        labels:
          job: observable-java-app
          service: observable-java-app
          # The app writes JSON here; docker-compose mounts ./logs/app read-only.
          __path__: /var/log/app/*.log
    pipeline_stages:
      # Parse the JSON the app emits, exposing a few fields for labelling.
      - json:
          expressions:
            level: level
            env: env
            event: event
      # Promote ONLY low-cardinality fields to Loki labels. trace_id and span_id
      # are deliberately NOT labels — they are high-cardinality and would blow up
      # the index. They stay in the log body and are searchable there.
      - labels:
          level:
          env:
          event:
