# =============================================================================
# Secure CI/CD pipeline — ANNOTATED EXAMPLE (kept under ci/ so GitHub never
# discovers or runs it; GitHub only reads repo-root .github/workflows/).
#
# A runnable, manual-only copy of this pipeline lives at
#   .github/workflows/secure-pipeline.yml
# inside this project folder. See README.md for how to activate it.
#
# Safety properties of this pipeline:
#   - trigger is workflow_dispatch (manual) only
#   - least-privilege permissions (contents: read)
#   - the Docker image is built locally on the runner and NEVER pushed
#   - signing/attestation is explained as a release-stage control, not executed
#   - no real tokens, registries, or secrets are embedded
#
# NOTE on action references: this example uses versioned GitHub Action
# references (e.g. actions/checkout@v4) for readability. A production pipeline
# should pin actions to full commit SHAs and update them through a controlled
# dependency process (e.g. Dependabot/Renovate with review).
# =============================================================================
name: secure-cicd-pipeline (example)

on:
  workflow_dispatch:
  # Realistic production triggers, shown for reference but inert here:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

# Least privilege by default. This pipeline neither pushes packages nor signs,
# so it needs nothing beyond read access to the repository contents.
# If keyless signing were enabled, the signing job would additionally need
# `id-token: write` (OIDC); if SARIF were uploaded to code scanning, the job
# would need `security-events: write`.
permissions:
  contents: read

env:
  # Path of this project folder relative to the repository root.
  # Adjust if the folder lives elsewhere (for example
  # "Projects/44-secure-ci-cd-pipeline" in a multi-project monorepo).
  PROJECT_DIR: "Projects/44-secure-ci-cd-pipeline"
  # Local-only image name with a traceable version-gitsha tag. Never pushed.
  IMAGE: secure-cicd-java-app

jobs:
  secure-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # --- 1. checkout --------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # --- 2. prepare artifact folder -----------------------------------------
      # Every tool below writes its evidence here; the upload step ships the
      # whole folder, so nothing is uploaded that was never created.
      - name: Create artifact directory
        run: mkdir -p "${{ env.PROJECT_DIR }}/artifacts"

      # --- 3. secret scan (gitleaks) ------------------------------------------
      # Runs against the working tree (--no-git) so it checks exactly what
      # would be built. Fails the pipeline if a credential-shaped string is
      # found. Runs via the official container image to avoid a license-gated
      # marketplace action.
      - name: Secret scan (gitleaks)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/scan:ro" \
            zricethezav/gitleaks:v8.18.4 \
            detect --source /scan --no-git --redact

      # --- 4. setup Java ------------------------------------------------------
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # --- 5. static analysis + compile ---------------------------------------
      # javac with all lints enabled and warnings promoted to errors acts as a
      # lightweight SAST gate for this dependency-free project. A larger
      # codebase would add a dedicated tool (e.g. Semgrep or SpotBugs).
      - name: Static analysis and compile (javac -Xlint -Werror)
        working-directory: ${{ env.PROJECT_DIR }}
        run: javac -Xlint:all -Werror -d out src/securecicdpipeline/*.java

      # --- 6. test ------------------------------------------------------------
      - name: Compile and run tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          javac -Xlint:all -Werror -cp out -d test-out test/securecicdpipeline/*.java
          java -cp "out:test-out" securecicdpipeline.BuildInfoTest

      # --- 7. build Docker image (local only — never pushed) ------------------
      - name: Build image (local only)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          docker build \
            --build-arg APP_VERSION=0.1.0 \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t "${{ env.IMAGE }}:0.1.0-${{ github.sha }}" .

      # --- 8. dependency / filesystem scan (Trivy fs) --------------------------
      # Scans the checked-out source tree for known-vulnerable dependencies and
      # misconfigurations. HIGH/CRITICAL findings fail the build.
      - name: Dependency scan (Trivy fs)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ${{ env.PROJECT_DIR }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: ${{ env.PROJECT_DIR }}/artifacts/trivy-deps.sarif

      # --- 9. image vulnerability scan (Trivy image) ---------------------------
      # Scans the built image's OS packages and app layers. HIGH/CRITICAL
      # findings fail the build before the image could ever be promoted.
      - name: Image scan (Trivy image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE }}:0.1.0-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: ${{ env.PROJECT_DIR }}/artifacts/trivy-image.sarif

      # --- 10. SBOM generation (Syft) ------------------------------------------
      # Produces a CycloneDX Software Bill of Materials for the built image.
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:0.1.0-${{ github.sha }}
          format: cyclonedx-json
          output-file: ${{ env.PROJECT_DIR }}/artifacts/sbom.cyclonedx.json
          upload-artifact: false

      # --- 11. signing / attestation (release-stage design, NOT executed) ------
      # Keyless signing (Cosign + Sigstore) binds a signature to a REGISTRY
      # IMAGE DIGEST using the workflow's OIDC identity. This pipeline never
      # pushes an image, so there is no registry digest to sign — by design.
      # A release pipeline would push, capture the digest, and then run
      # (with `permissions: id-token: write`):
      #   cosign sign --yes  <registry>/<repo>@<digest>
      #   cosign attest --yes --type cyclonedx \
      #     --predicate artifacts/sbom.cyclonedx.json <registry>/<repo>@<digest>
      # See docs/image-signing.md for the full flow and verification.
      - name: Signing and attestation (design note — nothing is signed here)
        run: |
          echo "Signing is a release-stage control and is NOT executed in this pipeline."
          echo "This build never pushes an image, so no registry digest exists to sign."
          echo "See docs/image-signing.md for the keyless (OIDC) flow a release job would run."

      # --- 12. upload artifact evidence ----------------------------------------
      # Uploads exactly the folder every earlier step wrote into.
      - name: Upload security evidence
        uses: actions/upload-artifact@v4
        with:
          name: security-evidence
          path: ${{ env.PROJECT_DIR }}/artifacts/
          if-no-files-found: error
