[defaults]
# The real inventory.ini is git-ignored. Create it from inventory.ini.example
# ONLY after an approved, disposable lab host exists. Nothing here connects to
# anything by default.
inventory = inventory.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = True
