---
# Configuration play: turn a bare provisioned host into a running app node.
# Targets the app_servers group from the inventory. This was NOT executed — no
# host was contacted and no change was made anywhere.
- name: Configure application servers
  hosts: app_servers
  become: true
  gather_facts: true

  roles:
    # 1) baseline every host the same way (packages, user, directories, time)
    - role: common
    # 2) then lay down the app-specific config and service
    - role: app
