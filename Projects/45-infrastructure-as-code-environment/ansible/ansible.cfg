[defaults]
# The real inventory.ini is git-ignored. Generate it with
# scripts/generate-inventory.py (preferred) or copy inventory.ini.example.
# Nothing here connects to anything by default; use --syntax-check to validate
# offline. Only run against real hosts if they are approved and disposable.
inventory = inventory.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = True
