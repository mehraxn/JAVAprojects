# Rendered Argo CD Application — payments-api PROD (manual sync). NOT deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-api-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-learning
  source:
    repoURL: https://example.invalid/payments-api-config.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: payments-api-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
