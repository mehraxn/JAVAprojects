# Argo CD Application for the PROD environment of a generated service.
# NOTE the differences from dev: prod values, prod namespace, and MANUAL sync
# (no automated apply) so a human promotes releases. Design artifact only —
# nothing was synced or deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: __SERVICE_NAME__-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-learning
  source:
    repoURL: https://example.invalid/__SERVICE_NAME__-config.git
    targetRevision: main
    path: helm-template
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: __SERVICE_NAME__-prod
  syncPolicy:
    # No `automated:` block on purpose — prod syncs only when a human clicks
    # sync (or an approved promotion job runs), giving a control gate.
    syncOptions:
      - CreateNamespace=true
