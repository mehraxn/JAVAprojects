apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "java-service.fullname" . }}
  labels:
    {{- include "java-service.labels" . | nindent 4 }}
data:
  SERVICE_NAME: {{ include "java-service.name" . | quote }}
  SERVICE_PORT: {{ .Values.containerPort | quote }}
  APP_ENV: {{ .Values.config.environment | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
