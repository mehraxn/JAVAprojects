# Blue-green rollout values. This optional chart renders both tracks and one
# Service whose selector follows activeTrack. It is intentionally blue-green
# only; canary examples live under k8s/canary/.

image:
  repository: registry.example.invalid/blue-green-canary-app
  blueTag: v1
  greenTag: v2
  pullPolicy: IfNotPresent

containerPort: 8080
activeTrack: blue

blue:
  enabled: true
  replicas: 3
green:
  enabled: true
  replicas: 3

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
