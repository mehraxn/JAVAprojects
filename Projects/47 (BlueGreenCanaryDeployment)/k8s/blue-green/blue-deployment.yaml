# BLUE = currently live version v1. Example manifest; not deployed in this portfolio repo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-blue
  labels:
    app: java-app
    track: blue
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: java-app
      track: blue
  template:
    metadata:
      labels:
        app: java-app
        track: blue
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.example.invalid/blue-green-canary-app:v1        # placeholder image; replace with your built image
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: v1
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
