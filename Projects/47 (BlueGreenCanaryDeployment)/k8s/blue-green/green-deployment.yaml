# GREEN = the new version (v2), deployed ALONGSIDE blue but receiving no live
# traffic until the Service is switched. Placeholder image only. NOT deployed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-green
  labels:
    app: java-app
    track: green
    version: v2
spec:
  replicas: 3        # same capacity as blue so the switch is seamless
  selector:
    matchLabels:
      app: java-app
      track: green
  template:
    metadata:
      labels:
        app: java-app
        track: green
        version: v2
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: my-java-app:v2        # placeholder tag
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: v2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
