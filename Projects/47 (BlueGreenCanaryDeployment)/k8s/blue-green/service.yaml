# The single stable Service users hit. Its `track` selector decides which
# Deployment receives ALL live traffic. Here it points at BLUE (v1).
# Blue-green switching = changing the one line `track: blue` -> `track: green`.
# NOT deployed.
apiVersion: v1
kind: Service
metadata:
  name: java-app
  labels:
    app: java-app
spec:
  type: ClusterIP
  selector:
    app: java-app
    track: blue          # <-- ACTIVE track. All traffic goes to blue/v1.
  ports:
    - name: http
      port: 80
      targetPort: http
