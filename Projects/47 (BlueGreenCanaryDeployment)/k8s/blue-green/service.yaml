# Stable Service users call during the blue-green flow.
# Initial state: selector points to blue/v1.
# To promote green/v2, apply ../blue-green-switch/switch-service-to-green.yaml separately.
apiVersion: v1
kind: Service
metadata:
  name: java-app
  labels:
    app: java-app
spec:
  type: ClusterIP
  selector:
    app: java-app
    track: blue
  ports:
    - name: http
      port: 80
      targetPort: http
