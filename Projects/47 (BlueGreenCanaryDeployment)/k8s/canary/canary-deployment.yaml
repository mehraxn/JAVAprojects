# CANARY = the new version (v2) taking a SMALL slice of traffic first.
# 1 canary replica against 9 stable ≈ 10% of requests. You raise the canary's
# replica count (or ingress weight) step by step as metrics stay healthy, then
# promote. Placeholder image only. NOT deployed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-canary
  labels:
    app: java-app
    track: canary
    version: v2
spec:
  replicas: 1        # ~10% with 9 stable replicas; increase to shift more traffic
  selector:
    matchLabels:
      app: java-app
      track: canary
  template:
    metadata:
      labels:
        app: java-app
        track: canary
        version: v2
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: my-java-app:v2        # placeholder tag
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: v2
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
