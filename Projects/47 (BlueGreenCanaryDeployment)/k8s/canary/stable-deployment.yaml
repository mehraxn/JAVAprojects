# STABLE = the proven version (v1) carrying the bulk of traffic during a canary.
# With 9 stable + 1 canary replica and a Service that selects BOTH, a plain
# round-robin Service sends ~90% of requests here (replica-ratio canary).
# Placeholder image only. NOT deployed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-stable
  labels:
    app: java-app
    track: stable
    version: v1
spec:
  replicas: 9
  selector:
    matchLabels:
      app: java-app
      track: stable
  template:
    metadata:
      labels:
        app: java-app
        track: stable
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: my-java-app:v1        # placeholder tag
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: v1
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
