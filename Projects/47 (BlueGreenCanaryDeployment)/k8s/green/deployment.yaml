apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app
      track: green
  template:
    metadata:
      labels:
        app: java-app
        track: green
    spec:
      containers:
        - name: app
          image: my-java-app:green-placeholder
          env:
            - name: APP_VERSION
              value: green
          # TODO: Add ports, probes, resources, and security context.
