# "App of apps" root. This single Argo CD Application watches the environments/
# directory and creates one child Application per environment (dev/staging/prod).
# Apply appproject.yaml before registering this root. NOT deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-app-root
  namespace: argocd
spec:
  project: cloud-native-app
  source:
    repoURL: https://example.invalid/cloud-native-app.git
    targetRevision: main
    # Each environments/<env>/application.yaml is a child Application.
    path: "48 (MultiEnvironmentCloudNativeApp)/environments"
    directory:
      recurse: true
      include: "*/application.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
