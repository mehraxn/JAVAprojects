# EXAMPLE template, disabled by default. Real secrets should come from a
# sealed-secret or External Secrets Operator, NOT from Helm values. This renders
# ONLY if you explicitly pass --set secret.create=true, and even then the values
# are placeholders. Never put real secrets in values files or Git.
{{- if .Values.secret }}
{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.fullname" . }}-secret
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME_placeholder"
  API_TOKEN: "REPLACE_ME_placeholder"
{{- end }}
{{- end }}
