# Base values. Per-environment overrides live in values-<env>.yaml and are the
# Helm equivalent of the Kustomize overlays under ../../k8s/overlays/.
replicaCount: 1

image:
  repository: my-cloud-native-java-app   # placeholder
  tag: "1.4.0"
  pullPolicy: IfNotPresent

containerPort: 8080

config:
  environment: base
  logLevel: INFO
  featureNewUi: "false"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
