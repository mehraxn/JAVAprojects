apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-java-app
  labels:
    app: cloud-native-java-app
spec:
  # replicas is intentionally set in each overlay (dev/staging/prod differ).
  replicas: 1
  selector:
    matchLabels:
      app: cloud-native-java-app
  template:
    metadata:
      labels:
        app: cloud-native-java-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          # Safe placeholder repository. Each overlay replaces the placeholder
          # tag with an environment-specific digest placeholder.
          image: registry.example.invalid/cloud-native-app:placeholder
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          # Baseline resources; overlays override per environment.
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
