# Design-only production overlay. Contains no real endpoint, secret, or account.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: app-prod
resources:
  - ../../base
nameSuffix: -prod
labels:
  - pairs:
      environment: prod
    includeSelectors: true
images:
  # Promotion copies the exact digest verified in staging into this field.
  - name: registry.example.invalid/cloud-native-app
    digest: sha256:REPLACE_WITH_PROD_DIGEST
patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
