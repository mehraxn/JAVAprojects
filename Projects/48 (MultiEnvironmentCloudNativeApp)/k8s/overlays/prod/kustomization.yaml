# Design-only production overlay. Contains no real endpoint, secret, or account.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: app-prod
resources:
  - ../../base
nameSuffix: -prod
commonLabels:
  environment: prod
images:
  # The exact same immutable artifact that passed dev AND staging.
  - name: my-cloud-native-java-app
    newTag: 1.4.0
patches:
  - path: deployment-patch.yaml
  - path: configmap-patch.yaml
