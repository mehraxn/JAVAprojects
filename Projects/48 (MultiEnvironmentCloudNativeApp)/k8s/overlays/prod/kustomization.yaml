# Design-only production overlay. It contains no real endpoint, secret, or account.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
nameSuffix: -prod
commonLabels:
  environment: prod-design-only
images:
  - name: my-cloud-native-java-app
    newTag: prod-placeholder
configMapGenerator:
  - name: app-config
    literals:
      - APP_ENVIRONMENT=prod-design-only

