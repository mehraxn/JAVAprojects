# STAGING: production-like but smaller. 2 replicas, mid-size resources.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-java-app
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
