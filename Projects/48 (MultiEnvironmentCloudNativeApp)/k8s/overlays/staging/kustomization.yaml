apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
nameSuffix: -staging
commonLabels:
  environment: staging
images:
  - name: my-cloud-native-java-app
    newTag: staging-placeholder
configMapGenerator:
  - name: app-config
    literals:
      - APP_ENVIRONMENT=staging
