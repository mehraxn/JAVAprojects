# Argo CD Application for DEV. Points at the dev Kustomize overlay. GitOps
# reconciles the cluster to match Git. Auto-sync for fast feedback. NOT deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloud-native-app
  source:
    repoURL: https://example.invalid/cloud-native-app.git
    targetRevision: main
    path: "Projects/48-multi-environment-cloud-native-app/k8s/overlays/dev"
  destination:
    server: https://kubernetes.default.svc
    namespace: app-dev
  syncPolicy:
    automated:            # dev auto-syncs
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
