# Argo CD Application for PROD. Points at the prod overlay. NOTE: NO `automated:`
# block — prod syncs only when a human clicks sync (a deliberate release gate).
# NOT deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-app-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloud-native-app
  source:
    repoURL: https://example.invalid/cloud-native-app.git
    targetRevision: main
    path: "Projects/48-multi-environment-cloud-native-app/k8s/overlays/prod"
  destination:
    server: https://kubernetes.default.svc
    namespace: app-prod
  syncPolicy:
    # Manual sync only. Promotion to prod is an explicit, audited human action.
    syncOptions:
      - CreateNamespace=true
