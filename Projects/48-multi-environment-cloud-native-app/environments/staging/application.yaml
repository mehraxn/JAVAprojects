# Argo CD Application for STAGING. Points at the staging overlay. Auto-sync so
# staging tracks main, giving a production-like pre-prod gate. NOT deployed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-app-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloud-native-app
  source:
    repoURL: https://example.invalid/cloud-native-app.git
    targetRevision: main
    path: "Projects/48-multi-environment-cloud-native-app/k8s/overlays/staging"
  destination:
    server: https://kubernetes.default.svc
    namespace: app-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
