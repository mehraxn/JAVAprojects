# EXAMPLE template, disabled by default. Real secrets should come from a
# sealed-secret or External Secrets Operator, NOT from Helm values. This renders
# ONLY if you explicitly set both secret.enabled=true and secret.create=true;
# even then the values are placeholders. Never put real secrets in values or Git.
{{- if and .Values.secret.enabled .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME_placeholder"
  API_TOKEN: "REPLACE_ME_placeholder"
{{- end }}
