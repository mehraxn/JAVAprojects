# Base values. Per-environment overrides live in values-<env>.yaml and are the
# Helm equivalent of the Kustomize overlays under ../../k8s/overlays/.
replicaCount: 1

image:
  repository: registry.example.invalid/cloud-native-app
  digest: "sha256:REPLACE_WITH_DIGEST"
  tag: "placeholder"
  pullPolicy: IfNotPresent

containerPort: 8080

config:
  environment: base
  logLevel: INFO
  featureNewUi: "false"

# Disabled by default. If enabled, the Deployment consumes this separately
# managed Secret. create=true renders placeholder values for demonstration only.
secret:
  enabled: false
  create: false
  name: app-secret

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
