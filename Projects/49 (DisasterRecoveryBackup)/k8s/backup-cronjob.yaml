# Scheduled logical backup CronJob. Runs pg_dump nightly into the backup PVC.
# SUSPENDED by default (suspend: true) so it does nothing until deliberately
# enabled with a reviewed destination. Credentials come from the Secret, never
# from this file. This is a reviewed example, but it is NOT deployed or tested.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    app: postgres
    role: backup
spec:
  schedule: "0 2 * * *"          # 02:00 daily — pair with RPO (see docs/rpo-rto.md)
  suspend: true                   # <-- safety: does not run until set to false
  concurrencyPolicy: Forbid       # never overlap backups
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:16   # provides pg_dump; pin a digest in prod
              envFrom:
                - secretRef:
                    name: postgres-credentials
              env:
                - name: PGHOST
                  value: postgres  # resolves through postgres-service.yaml
                - name: PGPORT
                  value: "5432"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  # postgres:16-alpine provides /bin/sh, not Bash. Keep this
                  # POSIX-compatible instead of enabling Bash-only pipefail.
                  set -eu
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  name="${POSTGRES_DB}-${ts}.dump"
                  out="/backups/${name}"
                  pg_dump -h "$PGHOST" -U "$POSTGRES_USER" \
                    -Fc --no-owner --no-privileges -f "$out" "$POSTGRES_DB"
                  cd /backups
                  sha256sum "$name" > "${name}.sha256"
                  date -u +%s > last_success_epoch
                  # retention: keep 7 days
                  find /backups -name "*.dump*" -mtime +7 -delete
                  echo "backup ok: $out"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
