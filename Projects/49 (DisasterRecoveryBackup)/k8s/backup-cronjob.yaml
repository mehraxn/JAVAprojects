# Scheduled logical backup CronJob. Runs pg_dump nightly into the backup PVC.
# SUSPENDED by default (suspend: true) so it does nothing until deliberately
# enabled with a reviewed destination. Credentials come from the Secret, never
# from this file. This is a reviewed example, but it is NOT deployed or tested.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    app: postgres
    role: backup
spec:
  schedule: "0 2 * * *"          # 02:00 daily — pair with RPO (see docs/rpo-rto.md)
  suspend: true                   # <-- safety: does not run until set to false
  concurrencyPolicy: Forbid       # never overlap backups
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: postgres:16   # provides pg_dump; pin a digest in prod
              envFrom:
                - secretRef:
                    name: postgres-credentials
              env:
                - name: PGHOST
                  value: postgres  # resolves through postgres-service.yaml
                - name: PGPORT
                  value: "5432"
              command: ["/bin/sh", "-c"]
              args:
                - |
                  # Invoked via /bin/sh on the postgres:16 (Debian) image. Keep
                  # this POSIX-compatible rather than relying on Bash features.
                  set -eu
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  name="${POSTGRES_DB}-${ts}.dump"
                  out="/backups/${name}"
                  pg_dump -h "$PGHOST" -U "$POSTGRES_USER" \
                    -Fc --no-owner --no-privileges -f "$out" "$POSTGRES_DB"
                  cd /backups
                  sha256sum "$name" > "${name}.sha256"
                  # Prometheus textfile metric (same format as scripts/backup.sh),
                  # written atomically so a partial file is never scraped.
                  epoch="$(date -u +%s)"
                  {
                    echo '# HELP disaster_recovery_backup_last_success_timestamp_seconds Unix timestamp of the last successful backup.'
                    echo '# TYPE disaster_recovery_backup_last_success_timestamp_seconds gauge'
                    echo "disaster_recovery_backup_last_success_timestamp_seconds ${epoch}"
                  } > backup_last_success.prom.tmp
                  mv backup_last_success.prom.tmp backup_last_success.prom
                  # retention: delete dumps older than 7 days (keeps ~7 daily backups)
                  find /backups -name "*.dump*" -mtime +6 -delete
                  echo "backup ok: $out"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: postgres-backups
