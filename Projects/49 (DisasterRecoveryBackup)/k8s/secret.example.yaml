# EXAMPLE ONLY — never commit a real Secret. Copy to secret.yaml (git-ignored)
# and fill from a secrets manager / sealed-secret. The values here are obvious
# placeholders, NOT real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app: postgres
type: Opaque
stringData:
  POSTGRES_DB: "app"
  POSTGRES_USER: "app"
  # Placeholder. Real password comes from a Secret manager, never Git.
  POSTGRES_PASSWORD: "REPLACE_ME_placeholder"
  # Used by the backup CronJob (libpq reads PGPASSWORD).
  PGPASSWORD: "REPLACE_ME_placeholder"
