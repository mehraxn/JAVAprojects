# Base values shared by all environments. Per-environment overrides live in
# values-dev.yaml / values-prod.yaml. NEVER put real secrets in any values file.
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  # Placeholder registry set by the generator at scaffold time.
  repository: registry.example.invalid/payments-api
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Port the container (and the Java app) listens on.
containerPort: 8080

config:
  environment: base
  logLevel: INFO

service:
  type: ClusterIP
  port: 80

probes:
  readiness:
    path: /ready
    initialDelaySeconds: 3
    periodSeconds: 10
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 20

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
