# Headless Service required by the postgres StatefulSet. It provides the stable
# in-cluster DNS name "postgres" used by the backup CronJob.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
